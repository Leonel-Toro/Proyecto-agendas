spring.application.name=AgendarReservas

server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:mariadb://localhost:3306/calendario_reservas}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.dialect.MariaDBDialect}

app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}


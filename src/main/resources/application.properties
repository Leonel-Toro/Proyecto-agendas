spring.application.name=AgendarReservas
server.port=${PORT:8080}

# Profile activo
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# JPA/Hibernate - SOLO POSTGRESQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CORS
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}

# JWT Configuration
# IMPORTANT: Generate a secure 512-bit (64 bytes) Base64-encoded secret key for production
# You can generate one using: openssl rand -base64 64
app.jwt.secret=${JWT_SECRET:dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9yand0dG9rZW5zYW5kaXRzaG91bGRiZWF0bGVhc3Q1MTJiaXRzbG9uZ2ZvckhTNTEyYWxnb3JpdGht}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_EXPIRATION:3600000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXPIRATION:604800000}
app.jwt.issuer=${JWT_ISSUER:AgendarReservas}

# Cookie Configuration
app.cookie.secure=${COOKIE_SECURE:false}
app.cookie.same-site=${COOKIE_SAME_SITE:Lax}
app.cookie.domain=${COOKIE_DOMAIN:}

# CSRF Configuration
app.csrf.enabled=${CSRF_ENABLED:true}

# Enable scheduled tasks (for token cleanup)
spring.task.scheduling.pool.size=2



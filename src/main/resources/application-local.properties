# Perfil LOCAL - PostgreSQL Local
spring.datasource.url=jdbc:postgresql://localhost:5432/p_agenda
spring.datasource.username=postgres
spring.datasource.password=1234

# Local development - disable secure cookies (no HTTPS)
# IMPORTANT: SameSite=Lax works without HTTPS, SameSite=None requires Secure=true
app.cookie.secure=false
app.cookie.same-site=Lax

# CORS - Allow frontend origin
app.cors.allowed-origins=http://localhost:5173

# CSRF disabled for easier local development (enable in production)
app.csrf.enabled=false


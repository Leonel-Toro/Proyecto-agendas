# Perfil PRODUCCION - PostgreSQL Railway
spring.datasource.url=${PG_JDBC_URL:}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

# JPA settings for production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Production - secure cookies (HTTPS required)
app.cookie.secure=true
app.cookie.same-site=Strict
app.cookie.domain=${COOKIE_DOMAIN:}

# CSRF enabled in production
app.csrf.enabled=true

# JWT settings - MUST use environment variables
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_EXPIRATION:3600000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXPIRATION:604800000}
app.jwt.issuer=${JWT_ISSUER:AgendarReservas}


# Perfil PRODUCCION - PostgreSQL Railway
spring.datasource.url=${PG_JDBC_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3

app.cookie.secure=true

app.cors.allowed-origins=${ALLOWED_ORIGINS}

# CSRF disabled: stateless JWT API protected by CORS origin allowlist
app.csrf.enabled=false

# JWT settings - Use environment variables in production
app.jwt.secret=${JWT_SECRET}

app.jwt.access-token-expiration-ms=1800000
app.jwt.refresh-token-expiration-ms=604800000
app.jwt.issuer=AgendarReservas

# Email (SMTP) - variables de entorno obligatorias en produccion
spring.mail.port=587
spring.mail.username=darkleon94@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.mail.enabled=true
app.mail.from=darkleon94@gmail.com
app.mail.from-name=AgendarReservas
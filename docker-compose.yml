services:
  db:
    image: postgres:16-alpine
    container_name: postgres_agendas
    environment:
      POSTGRES_DB: agendas_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 20435Leonel
      TZ: "UTC"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
